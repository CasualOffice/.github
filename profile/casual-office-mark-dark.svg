<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Casual Office (dark variant)">
  <title>Casual Office</title>
  <!--
    Dark-theme variant: deep slate background so the mark reads against
    GitHub's dark UI. The CO wordmark switches to a cyan gradient stroke
    that picks up the slight glow from the radial highlight.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A111E"/>
      <stop offset="60%" stop-color="#0F1A2A"/>
      <stop offset="100%" stop-color="#16243A"/>
    </linearGradient>
    <radialGradient id="hi" cx="0.28" cy="0.22" r="0.9">
      <stop offset="0%" stop-color="rgba(34,211,238,0.20)"/>
      <stop offset="60%" stop-color="rgba(34,211,238,0.04)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0)"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#hi)"/>

  <rect x="14" y="14" width="484" height="484" rx="82"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <path d="M 224 192 A 90 90 0 1 0 224 320"
        fill="none" stroke="url(#stroke)" stroke-width="44"
        stroke-linecap="round"/>

  <circle cx="380" cy="256" r="68"
          fill="none" stroke="url(#stroke)" stroke-width="44"/>
</svg>
