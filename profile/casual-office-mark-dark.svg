<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Casual Office (dark theme)">
  <title>Casual Office</title>
  <!--
    Dark-theme variant: deep slate background so the mark reads against
    GitHub's dark UI. The "co" monogram switches to cyan-tinted white so
    the strokes have a touch of warmth on near-black.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A111E"/>
      <stop offset="100%" stop-color="#16243A"/>
    </linearGradient>
    <radialGradient id="highlight" cx="0.3" cy="0.25" r="0.85">
      <stop offset="0%" stop-color="rgba(34,211,238,0.18)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0)"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#highlight)"/>

  <rect x="14" y="14" width="484" height="484" rx="84"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <path d="M 278 178 A 110 110 0 1 0 278 334"
        fill="none" stroke="url(#stroke)" stroke-width="44"
        stroke-linecap="round"/>

  <circle cx="402" cy="256" r="60"
          fill="none" stroke="url(#stroke)" stroke-width="44"/>
</svg>
