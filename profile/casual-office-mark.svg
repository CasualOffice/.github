<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Casual Office">
  <title>Casual Office</title>
  <!--
    Monogram mark: a lowercase "co" reduced to two geometric strokes.
    The open "c" (3/4 arc) faces the closed "o" — together they read as
    "co" at any size and stay legible under GitHub's circular avatar mask.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E7490"/>
      <stop offset="55%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="highlight" cx="0.3" cy="0.25" r="0.85">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background tile. GitHub crops to a circle, but the rounded square keeps
       the artwork balanced when used as a square favicon / og image too. -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#highlight)"/>

  <!-- Subtle hairline ring — premium nod, reads as a window frame. -->
  <rect x="14" y="14" width="484" height="484" rx="84"
        fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>

  <!-- "c" — 3/4 arc, mouth opens to the right. -->
  <path d="M 278 178 A 110 110 0 1 0 278 334"
        fill="none" stroke="#FFFFFF" stroke-width="44"
        stroke-linecap="round"/>

  <!-- "o" — closed ring, sits in the c's mouth. -->
  <circle cx="402" cy="256" r="60"
          fill="none" stroke="#FFFFFF" stroke-width="44"/>
</svg>
